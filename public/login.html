<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vardan AI - Admin Portal Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-wrapper">
          <i class="fa-solid fa-hospital-user"></i>
        </div>
        <h1>Vardan AI Portal</h1>
        <p>Clinic Control Center Secure Login</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="password"><i class="fa-solid fa-key"></i> Administrator Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Enter portal password" required autocomplete="current-password">
            <button type="button" id="toggle-password" tabindex="-1">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="error-msg" id="error-msg">
          <i class="fa-solid fa-triangle-exclamation"></i> Incorrect password. Please try again.
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">
          <span class="btn-text">Log In to Control Panel</span>
          <span class="btn-spinner"><i class="fa-solid fa-spinner fa-spin"></i> Authenticating...</span>
        </button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
